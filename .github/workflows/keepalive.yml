on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      YOUTUBE_URL: "https://youtube-kh6rosxefwmjzgadaq7i9q.streamlit.app/"
      ZEEHINDI_URL: "https://contenthindinews-ncirgqofw4tgg8vveurmty.streamlit.app/"
      ENGLISH_URL: "https://contentenglish-nawkm6f4mkqxijwdjrbx7z.streamlit.app/"

    steps:
      - name: Ping Streamlit apps with names + logging
        run: |
          echo "Starting keep-alive pings..."

          LOG_FILE="keep_alive.log"

          # Create file only if it doesn't exist
          if [ ! -f "$LOG_FILE" ]; then
            touch "$LOG_FILE"
          fi

          APPS=(
            "YouTube|$YOUTUBE_URL"
            "ZeeHindi|$ZEEHINDI_URL"
            "English|$ENGLISH_URL"
          )

          for entry in "${APPS[@]}"
          do
            NAME=$(echo "$entry" | cut -d'|' -f1)
            URL=$(echo "$entry" | cut -d'|' -f2)

            echo "🔗 Pinging [$NAME] -> $URL"

            for i in {1..3}
            do
              TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S')

              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$URL")

              if [ "$HTTP_CODE" = "200" ]; then
                STATUS="SUCCESS"
                echo "✅ $NAME Success (200)"
                echo "$TIMESTAMP | $NAME | $URL | $STATUS" >> "$LOG_FILE"
                break
              else
                STATUS="FAILED ($HTTP_CODE)"
                echo "⚠️ $NAME Retry in 60s... (Code: $HTTP_CODE)"
                echo "$TIMESTAMP | $NAME | $URL | $STATUS" >> "$LOG_FILE"
                sleep 60
              fi
            done

            echo "-----------------------------"
          done

          echo "✅ All pings completed."

      - name: Upload log file
        uses: actions/upload-artifact@v4
        with:
          name: keep-alive-logs
          path: keep_alive.log
