name: Keep Streamlit Apps Alive

on:
  schedule:
    - cron: "*/20 * * * *"
    - cron: "10-59/20 * * * *"
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping Streamlit apps with names + logging
        env:
          TARGET_URLS: "YouTube|https://youtube-kh6rosxefwmjzgadaq7i9q.streamlit.app/,ZeeHindi|https://contenthindinews-ncirgqofw4tgg8vveurmty.streamlit.app/,English|https://contentenglish-4lqyek9fghp4imenjzbypu.streamlit.app/"
        run: |
          echo "Starting keep-alive pings..."

          LOG_FILE="keep_alive.log"
          touch $LOG_FILE

          IFS=',' read -ra URLS <<< "$TARGET_URLS"

          for entry in "${URLS[@]}"
          do
            entry=$(echo "$entry" | xargs)

            # Split NAME and URL
            NAME=$(echo "$entry" | cut -d'|' -f1)
            URL=$(echo "$entry" | cut -d'|' -f2)

            echo "🔗 Pinging [$NAME] -> $URL"

            for i in {1..3}
            do
              TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S')

              if curl -s --max-time 30 "$URL" > /dev/null; then
                STATUS="SUCCESS"
                echo "✅ $NAME Success"
                echo "$TIMESTAMP | $NAME | $URL | $STATUS" >> $LOG_FILE
                break
              else
                STATUS="FAILED"
                echo "⚠️ $NAME Retry in 60s..."
                echo "$TIMESTAMP | $NAME | $URL | $STATUS" >> $LOG_FILE
                sleep 60
              fi
            done

            echo "-----------------------------"
          done

          echo "✅ All pings completed."

      - name: Upload log file
        uses: actions/upload-artifact@v4
        with:
          name: keep-alive-logs
          path: keep_alive.log
