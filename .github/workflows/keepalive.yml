name: Keep Streamlit Apps Alive

permissions:
  contents: write

concurrency:
  group: keepalive
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "*/10 * * * *"

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: browser-actions/setup-chrome@v1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Run keep-alive script
        env:
          TARGET_URLS: ${{ vars.TARGET_URLS }}
        run: python keep_alive.py || echo "Script failed"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: error-screenshots
          path: error_*.png
          retention-days: 7
          if-no-files-found: ignore

      - name: Commit log file
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add keep_alive.log
          git commit -m "update keep-alive log" || echo "no changes"
          git push