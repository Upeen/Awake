name: Keep Streamlit Apps Alive

on:
  schedule:
    # Primary schedule (every 20 min)
    - cron: "*/20 * * * *"
    # Backup schedule (offset by 10 mins)
    - cron: "10-59/20 * * * *"
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping Streamlit apps multiple times
        env:
          TARGET_URLS: "https://youtube-kh6rosxefwmjzgadaq7i9q.streamlit.app/,https://contenthindinews-ncirgqofw4tgg8vveurmty.streamlit.app/,https://contentenglish-4lqyek9fghp4imenjzbypu.streamlit.app/"
        run: |
          echo "Starting keep-alive pings..."

          # Split URLs into array
          IFS=',' read -ra URLS <<< "$TARGET_URLS"

          for url in "${URLS[@]}"
          do
            # Trim spaces (safety)
            url=$(echo "$url" | xargs)

            echo "🔗 Pinging $url"

            # Try 3 times
            for i in {1..3}
            do
              echo "Attempt $i..."

              if curl -s --max-time 30 "$url" > /dev/null; then
                echo "✅ Success"
                break
              else
                echo "⚠️ Retry in 60s..."
                sleep 60
              fi
            done

            echo "-----------------------------"
          done

          echo "✅ All pings completed."
