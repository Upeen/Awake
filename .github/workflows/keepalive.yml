name: Keep Streamlit Apps Alive

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run keep-alive script
        env:
          TARGET_URLS: ${{ vars.TARGET_URLS }} # Set this in GitHub Repository Variables to avoid hardcoding
        run: python keep_alive.py

      - name: Upload Error Screenshots (if any)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: error-screenshots
          path: error_*.png
          retention-days: 7
          if-no-files-found: ignore

      - name: Commit log file
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add keep_alive.log
          git commit -m "update keep-alive log (max 50 lines)" || echo "no changes"
          git push
