name: Keep Streamlit Apps Alive

on:
  schedule:
    - cron: "*/20 * * * *"
    - cron: "10-59/20 * * * *"
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping Streamlit apps
        env:
          TARGET_URLS: ${{ vars.TARGET_URLS }}
        run: |
          echo "Starting keep-alive..."

          IFS=',' read -ra URLS <<< "$TARGET_URLS"

          for url in "${URLS[@]}"
          do
            echo "Pinging $url"

            for i in {1..3}
            do
              curl -s --max-time 30 "$url" > /dev/null && echo "Success" || echo "Retry"
              sleep 60
            done

          done

          echo "Finished."
